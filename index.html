};

// Auto-select a presentation model based on level, peak family, and intent
// This replaces the manual Step 2 choice.
function autoSelectModel(level, peakFamily, intent) {
  const isAdvanced = level === "intermediate" || level === "advanced";
  const isL2 = level === "allLevels";
  if (!isAdvanced && !isL2) return "seesaw"; // L1 — simplest, confidence-building
  if (intent === "calming")    return isAdvanced ? "chain"        : "seesaw";
  if (intent === "energizing") return isAdvanced ? "spiral"       : "ladder";
  // balanced
  if (isAdvanced) return (peakFamily === "armBalance" || peakFamily === "inversion") ? "spiral" : "waves";
  return "ladder"; // L2 balanced
}

const EMPHASIS_MULT = { less: 0.55, normal: 1.0, more: 1.7 };

function computeSectionBudgets(totalLength, savasana, emphasis = {}) {
  const working = totalLength - savasana;
  const budgets = {};
  // Build emphasis-adjusted proportions
  const adjProps = {};
  Object.entries(SECTION_PROPORTIONS).forEach(([k, [prop, min]]) => {
    adjProps[k] = prop * (EMPHASIS_MULT[emphasis[k] || "normal"] || 1.0);
  });
  // Normalise so they still sum to 1.0
  const propTotal = Object.values(adjProps).reduce((s, v) => s + v, 0);
  Object.keys(adjProps).forEach(k => { adjProps[k] /= propTotal; });
  // First pass: compute ideal times
  Object.entries(SECTION_PROPORTIONS).forEach(([k]) => {
    budgets[k] = Math.round(adjProps[k] * working);
  });
  // Drop optional sections if below their minimum
  DROP_ORDER.forEach(key => {
    const [, min] = SECTION_PROPORTIONS[key];
    if (budgets[key] < min) {
      budgets[key] = 0;
    }
  });
  // Redistribute freed time proportionally among remaining sections
  const activeKeys = Object.keys(SECTION_PROPORTIONS).filter(k => budgets[k] > 0);
  const allocTotal = activeKeys.reduce((s, k) => s + budgets[k], 0);
  const remainder  = working - allocTotal;
  if (remainder !== 0 && activeKeys.length) {
    const totalProp = activeKeys.reduce((s, k) => s + SECTION_PROPORTIONS[k][0], 0);
    activeKeys.forEach(k => {
      budgets[k] += Math.round((SECTION_PROPORTIONS[k][0] / totalProp) * remainder);
    });
  }
  budgets.savasana = savasana;
  return budgets;
}

// ─── ROUNTREE MODEL APPLICATION ─────────────────────────────────────────────
// The core insight: presentation models apply PER SIDE for bilateral sections.
// You complete the full pattern on the right, then repeat on the left.
// Symmetrical poses (Prasarita, Down Dog, etc.) within a bilateral section
// are done ONCE — they're natural rest/transition points between sides.

function applyModel(poses, model) {
  const names = poses.map(p => p.pose);
  const n = names.length;
  if (n === 0) return { poses, patternDescription: "", patternDiagram: "" };

  // Classify each pose as bilateral or symmetrical
  const bilateralFlags = poses.map(p => isBilateral(p.pose, p.note));
  const hasBilateral = bilateralFlags.some(Boolean);
  const hasSymmetrical = bilateralFlags.some(f => !f);
  const allSymmetrical = bilateralFlags.every(f => !f);

  // Short labels for diagram — abbreviate long names
  const abbrev = (name) => {
    const lookup = {
      "Virabhadrasana I": "Vira I", "Virabhadrasana II": "Vira II",
      "Virabhadrasana III": "Vira III", "Utthita Trikonasana": "Trikonasana",
      "Utthita Parsvakonasana": "Parsvakonasana", "Parivrtta Trikonasana": "Parivrtta Trik.",
      "Prasarita Padottanasana A": "Prasarita A", "Prasarita Padottanasana A and C": "Prasarita A+C",
      "Parsvottanasana": "Parsvottanasana", "Ashta Chandrasana": "Ashta Chandrasana",
      "Ardha Chandrasana": "Ardha Chandrasana",
    };
    return lookup[name] || name;
  };

  // Build side-aware label: bilateral poses get "(R)" / "(L)" suffix, symmetrical get "(both)"
  const sideLabel = (name, side, isSymm) => {
    if (isSymm) return `${abbrev(name)} ✦`;  // ✦ = done once, no side
    return `${abbrev(name)} (${side})`;
  };

  // Build the full side-aware sequence string for one side
  const oneSideSeq = (side) =>
    names.map((name, i) => sideLabel(name, side, !bilateralFlags[i])).join(" → ");

  let patternDiagram = "";
  let patternDescription = "";
  let newPoses = poses.map(p => ({ ...p }));

  // Symmetrical-only section: sides don't apply — use simpler patterns
  if (allSymmetrical) {
    switch (model) {
      case "seesaw": {
        const a = names[0], b = names[1] || names[0];
        patternDiagram = n === 1
          ? `${abbrev(a)} — enter/exit 3× with breath → hold 5 breaths`
          : `${abbrev(a)} ↔ ${abbrev(b)}, 2–3× → hold ${abbrev(a)} → hold ${abbrev(b)}`;
        patternDescription = n === 1
          ? `Move in and out of ${a} dynamically with the breath 3 times, then settle into a full hold.`
          : `Swing between ${a} and ${b} with the breath. Both are symmetrical — no side-switching needed.`;
        break;
      }
      default: {
        patternDiagram = names.map(abbrev).join(" → ");
        patternDescription = `All poses are symmetrical — no side management needed. Flow through in order.`;
      }
    }
    newPoses.forEach((p, i) => {
      p.note = (p.note || "") + ` | Symmetrical — do once.`;
    });
    return { poses: newPoses, patternDescription, patternDiagram };
  }

  // Build a legend note explaining the diagram notation
  const legendNote = hasBilateral && hasSymmetrical
    ? `  ✦ = done once (symmetrical)  ·  (R)/(L) = right side / left side`
    : `  (R) = right side first  ·  (L) = left side after`;

  switch (model) {
    case "seesaw": {
      // Seesaw WITHIN a side: A(R) ↔ B(R) 2–3×, hold A(R), hold B(R), then LEFT side
      const bilPoses = names.filter((_, i) => bilateralFlags[i]);
      const symmPoses = names.filter((_, i) => !bilateralFlags[i]);
      const a = bilPoses[0] || names[0];
      const b = bilPoses[1] || bilPoses[0];

      if (symmPoses.length > 0) {
        patternDiagram = `${symmPoses.map(abbrev).join(" → ")} ✦\n`
          + `then: ${abbrev(a)} (R) ↔ ${abbrev(b)} (R), 2–3× → hold ${abbrev(a)} (R) → hold ${abbrev(b)} (R)\n`
          + `↺ repeat LEFT side: ${abbrev(a)} (L) ↔ ${abbrev(b)} (L) → hold both`;
        patternDescription = `Begin with ${symmPoses.join(", ")} (symmetrical — done once). Then seesaw ${a} ↔ ${b} on the RIGHT: swing 2–3× with the breath, hold each. Return to centre or a symmetrical pose between sides, then repeat the full seesaw on the LEFT.`;
      } else {
        patternDiagram = `${abbrev(a)} (R) ↔ ${abbrev(b)} (R), 2–3× → hold ${abbrev(a)} (R) → hold ${abbrev(b)} (R)\n↺ repeat: ${abbrev(a)} (L) ↔ ${abbrev(b)} (L) → hold both`;
        patternDescription = `Seesaw ${a} and ${b} on the RIGHT side: swing with the breath 2–3 times, then hold each fully. Transition through Down Dog or Tadasana, then repeat the seesaw on the LEFT.`;
      }
      newPoses.forEach((p, i) => {
        if (!bilateralFlags[i]) {
          p.note = (p.note || "") + ` | ✦ Symmetrical — done once as transition between sides.`;
        } else {
          const isFirst = bilPoses.indexOf(p.pose) === 0;
          p.note = (p.note || "") + ` | SEESAW ${isFirst ? "home base" : "second pose"} — complete RIGHT side fully, then LEFT. Swing 2–3× with breath before holding.`;
        }
      });
      break;
    }

    case "ladder": {
      // Ladder per side: build A(R)↔B(R) → B(R)↔C(R) → hold C(R), then LEFT
      const rightSeq = oneSideSeq("R");
      const leftSeq = oneSideSeq("L");
      const symmInSection = names.filter((_, i) => !bilateralFlags[i]);

      patternDiagram = `RIGHT: ${rightSeq}\n↺ LEFT: ${leftSeq}`;
      if (symmInSection.length > 0) patternDiagram += `\n${legendNote}`;

      patternDescription = `Complete the full ladder on the RIGHT side first — each bilateral pose seesaws with the next, then that pose becomes the new home base. ${symmInSection.length > 0 ? `${symmInSection.join(", ")} are symmetrical and done once as anchors. ` : ""}After the last pose on the right, transition and repeat the ladder on the LEFT.`;

      newPoses.forEach((p, i) => {
        if (!bilateralFlags[i]) {
          p.note = (p.note || "") + ` | ✦ Symmetrical — anchor pose, done once. Use as rest between the R and L ladder sequences.`;
        } else {
          const bilIdx = names.filter((_, j) => j <= i && bilateralFlags[j]).length - 1;
          const totalBil = bilateralFlags.filter(Boolean).length;
          if (bilIdx === 0) p.note = (p.note || "") + ` | LADDER start (R then L) — seesaw with the next pose. Complete full ladder on right before switching sides.`;
          else if (bilIdx < totalBil - 1) p.note = (p.note || "") + ` | LADDER rung ${bilIdx + 1} (R then L) — arrived from previous. Now seesaw with the next pose.`;
          else p.note = (p.note || "") + ` | LADDER top rung (R then L) — hold fully on RIGHT, then repeat left side.`;
        }
      });
      break;
    }

    case "spiral": {
      // Spiral per side: build on right (returning to start each round), then left
      const symmInSection = names.filter((_, i) => !bilateralFlags[i]);
      const bilNames = names.filter((_, i) => bilateralFlags[i]);

      const rightRounds = bilNames.map((_, i) =>
        bilNames.slice(0, i + 1).map(n => `${abbrev(n)} (R)`).join(" → ")
      ).join(",  ");

      patternDiagram = `RIGHT rounds: ${rightRounds}\n↺ LEFT rounds: ${bilNames.map((_, i) => bilNames.slice(0, i + 1).map(n => `${abbrev(n)} (L)`).join(" → ")).join(",  ")}`;
      if (symmInSection.length > 0) patternDiagram += `\n${legendNote}`;

      patternDescription = `Pyramid on the RIGHT side: ${bilNames[0]} alone, then add ${bilNames[1] || "next pose"}, always returning to ${bilNames[0]} at the start of each round. ${symmInSection.length > 0 ? `${symmInSection.join(", ")} ${symmInSection.length > 1 ? "are" : "is"} symmetrical — done once as an anchor. ` : ""}Complete all rounds on the right, then build the same pyramid on the LEFT.`;

      newPoses.forEach((p, i) => {
        if (!bilateralFlags[i]) {
          p.note = (p.note || "") + ` | ✦ Symmetrical — done once as anchor between R and L spirals.`;
        } else {
          const bilIdx = names.filter((_, j) => j <= i && bilateralFlags[j]).length - 1;
          if (bilIdx === 0) p.note = (p.note || "") + ` | SPIRAL anchor (R then L) — start of every round. Each round adds a new pose before returning here.`;
          else p.note = (p.note || "") + ` | SPIRAL round ${bilIdx + 1} (R then L) — added this round. After, return to ${abbrev(bilNames[0])} before adding the next pose. Complete all rounds on right before switching to left.`;
        }
      });
      break;
    }

    case "waves": {
      // Waves per side: first wave on right, second wave carries forward on right, then left
      const bilNames = names.filter((_, i) => bilateralFlags[i]);
      const symmNames = names.filter((_, i) => !bilateralFlags[i]);
      const midpoint = Math.floor(bilNames.length / 2);
      const beachhead = bilNames[midpoint] || bilNames[bilNames.length - 1];

      const wave1R = bilNames.slice(0, midpoint + 1).map(n => `${abbrev(n)} (R)`).join(" → ");
      const wave2R = bilNames.slice(midpoint).map(n => `${abbrev(n)} (R)`).join(" → ");
      const wave1L = bilNames.slice(0, midpoint + 1).map(n => `${abbrev(n)} (L)`).join(" → ");
      const wave2L = bilNames.slice(midpoint).map(n => `${abbrev(n)} (L)`).join(" → ");

      patternDiagram = symmNames.length > 0
        ? `✦ ${symmNames.map(abbrev).join(" → ")} (once)\n`
          + `RIGHT — Wave 1: ${wave1R}  |  Wave 2: ${wave2R}\n`
          + `↺ LEFT — Wave 1: ${wave1L}  |  Wave 2: ${wave2L}\n`
          + legendNote
        : `RIGHT — Wave 1: ${wave1R}  |  Wave 2: ${wave2R}\n↺ LEFT — Wave 1: ${wave1L}  |  Wave 2: ${wave2L}`;

      patternDescription = `${symmNames.length > 0 ? `${symmNames.join(", ")} ${symmNames.length > 1 ? "are" : "is"} symmetrical — done once to open the section. Then: ` : ""}complete both waves on the RIGHT side first. Wave 1 builds to ${beachhead} (R), which becomes the launchpad for Wave 2 (R). Transition (Down Dog or Tadasana), then repeat both waves on the LEFT. Rule: max 2–3 sustained poses on one side before switching.`;

      newPoses.forEach((p, i) => {
        if (!bilateralFlags[i]) {
          p.note = (p.note || "") + ` | ✦ Symmetrical — done once before the bilateral waves begin.`;
        } else {
          const bilIdx = names.filter((_, j) => j <= i && bilateralFlags[j]).length - 1;
          if (bilIdx < midpoint) {
            p.note = (p.note || "") + ` | WAVE 1 (R then L) — building toward ${abbrev(beachhead)}. Complete Wave 1 fully on right before switching sides.`;
          } else if (bilIdx === midpoint) {
            p.note = (p.note || "") + ` | WAVE beachhead (R then L) — hold on RIGHT, then this becomes the launch of Wave 2 on right. After both waves right, repeat left.`;
          } else {
            p.note = (p.note || "") + ` | WAVE 2 (R then L) — carried forward from ${abbrev(beachhead)}. Complete Wave 2 on right, then do both waves on left.`;
          }
        }
      });
      break;
    }

    case "chain": {
      // Chain: explicitly one side then the other — clearest model for bilateral
      const symmNames = names.filter((_, i) => !bilateralFlags[i]);
      const chainR = oneSideSeq("R");
      const chainL = oneSideSeq("L");

      patternDiagram = symmNames.length > 0
        ? `✦ ${symmNames.map(abbrev).join(" → ")} (once)\nRIGHT: ${chainR}\n↺ LEFT: ${chainL}\n${legendNote}`
        : `RIGHT: ${chainR}\n↺ LEFT: ${chainL}`;

      patternDescription = `${symmNames.length > 0 ? `${symmNames.join(", ")} ${symmNames.length > 1 ? "are" : "is"} symmetrical — done once. Then: ` : ""}link all bilateral poses directly on the RIGHT side (no returns), then repeat the full chain on the LEFT. Max 4–5 bilateral poses per chain. Reduce holds slightly — this is continuous flow.`;

      newPoses.forEach((p, i) => {
        if (!bilateralFlags[i]) {
          p.note = (p.note || "") + ` | ✦ Symmetrical — done once before the chain. Natural rest point.`;
        } else {
          const bilIdx = names.filter((_, j) => j <= i && bilateralFlags[j]).length - 1;
          const totalBil = bilateralFlags.filter(Boolean).length;
          const nextBil = names.find((_, j) => j > i && bilateralFlags[j]);
          const prevBil = [...names].reverse().find((_, j) => names.length - 1 - j < i && bilateralFlags[names.length - 1 - j]);

          if (bilIdx === 0) p.note = (p.note || "") + ` | CHAIN start — flow directly into ${abbrev(nextBil || "next")} (R). Complete full chain on right, then repeat left.`;
          else if (bilIdx < totalBil - 1) p.note = (p.note || "") + ` | CHAIN link — from ${abbrev(prevBil || "previous")} (R) → directly into ${abbrev(nextBil || "next")} (R).`;
          else p.note = (p.note || "") + ` | CHAIN end — last pose on right. Transition (Tadasana / Down Dog) then start chain on LEFT.`;
          if (p.duration > 2) p.duration = Math.max(1, p.duration - 1);
        }
      });
      break;
    }

    case "elimination": {
      // Elimination per side: build up and eliminate on R, then repeat on L
      const bilNames = names.filter((_, i) => bilateralFlags[i]);
      const symmNames = names.filter((_, i) => !bilateralFlags[i]);

      const buildUp = bilNames.map((_, i) => bilNames.slice(0, i + 1).map(n => `${abbrev(n)} (R)`).join("→")).join(", ");
      const dropDown = bilNames.slice(1).map((_, i) => bilNames.slice(i + 1).map(n => `${abbrev(n)} (R)`).join("→")).join(", ");

      patternDiagram = symmNames.length > 0
        ? `✦ ${symmNames.map(abbrev).join(" → ")} (once)\nRIGHT build: ${buildUp}\nRIGHT eliminate: ${dropDown}\n↺ Repeat entire elimination on LEFT\n${legendNote}`
        : `RIGHT build: ${buildUp}\nRIGHT eliminate: ${dropDown}\n↺ Repeat entire elimination on LEFT`;

      patternDescription = `${symmNames.length > 0 ? `${symmNames.join(", ")} ${symmNames.length > 1 ? "are" : "is"} symmetrical — done once as the opening anchor. Then: ` : ""}run the full elimination on the RIGHT — build up adding one pose at a time, then drop the first each time a new one arrives. Complete on right, then repeat the full elimination on the LEFT.`;

      newPoses.forEach((p, i) => {
        if (!bilateralFlags[i]) {
          p.note = (p.note || "") + ` | ✦ Symmetrical — done once as opening anchor before the elimination begins.`;
        } else {
          const bilIdx = names.filter((_, j) => j <= i && bilateralFlags[j]).length - 1;
          const totalBil = bilateralFlags.filter(Boolean).length;
          if (bilIdx === 0) p.note = (p.note || "") + ` | ELIMINATION start (R then L) — present alone first, then with ${abbrev(bilNames[1] || "next")}. Eliminated once ${abbrev(bilNames[2] || "third pose")} arrives. Complete full elimination on right before switching left.`;
          else if (bilIdx < totalBil - 1) p.note = (p.note || "") + ` | ELIMINATION middle (R then L) — introduced in round ${bilIdx + 1}. Remains as earlier poses drop away.`;
          else p.note = (p.note || "") + ` | ELIMINATION end (R then L) — the final arrival that pushes the sequence forward. Then repeat entire elimination on LEFT.`;
        }
      });
      break;
    }

    case "rewind": {
      // Rewind: forward on R, reverse on R, then forward on L, reverse on L
      const bilNames = names.filter((_, i) => bilateralFlags[i]);
      const symmNames = names.filter((_, i) => !bilateralFlags[i]);

      const fwdR = bilNames.map(n => `${abbrev(n)} (R)`).join(" → ");
      const bwdR = [...bilNames].reverse().map(n => `${abbrev(n)} (R)`).join(" → ");
      const fwdL = bilNames.map(n => `${abbrev(n)} (L)`).join(" → ");
      const bwdL = [...bilNames].reverse().map(n => `${abbrev(n)} (L)`).join(" → ");

      patternDiagram = symmNames.length > 0
        ? `✦ ${symmNames.map(abbrev).join(" → ")} (once)\nRIGHT: ${fwdR} ↩ ${bwdR}\n↺ LEFT: ${fwdL} ↩ ${bwdL}\n${legendNote}`
        : `RIGHT: ${fwdR} ↩ ${bwdR}\n↺ LEFT: ${fwdL} ↩ ${bwdL}`;

      patternDescription = `${symmNames.length > 0 ? `${symmNames.join(", ")} ${symmNames.length > 1 ? "are" : "is"} symmetrical — done once. Then: ` : ""}go forward through all bilateral poses on the RIGHT (${fwdR}), then reverse back (${bwdR}). The reversal demands concentric contraction where you'd normally use eccentric. Transition, then repeat forward and reverse on the LEFT.`;

      newPoses.forEach((p, i) => {
        if (!bilateralFlags[i]) {
          p.note = (p.note || "") + ` | ✦ Symmetrical — done once before the rewind sequence begins.`;
        } else {
          const bilIdx = names.filter((_, j) => j <= i && bilateralFlags[j]).length - 1;
          const totalBil = bilateralFlags.filter(Boolean).length;
          p.note = (p.note || "") + ` | REWIND position ${bilIdx + 1} of ${totalBil} (R then L) — position ${totalBil - bilIdx} in the reverse. Do full forward+reverse on right, then repeat on left.`;
        }
      });
      break;
    }

    default:
      patternDiagram = `RIGHT: ${oneSideSeq("R")}\n↺ LEFT: ${oneSideSeq("L")}`;
      patternDescription = `Complete all bilateral poses on the right side, then repeat on the left. Symmetrical poses are done once.`;
  }

  return { poses: newPoses, patternDescription, patternDiagram };
}

// Apply model to a section, returns section with model-shaped poses + pattern info
function applyModelToSection(section, model) {
  // Only apply model to the "building" sections — standing and peak approach
  const buildSections = ["standing", "backbend", "armBalance"];
  if (!buildSections.includes(section.family)) return { ...section, patternDescription: "", patternDiagram: "" };
  // Don't apply to pose lists that are just one item
  const applicable = section.poses.filter(p => !p.isPeak);
  if (applicable.length < 2) return { ...section, patternDescription: "", patternDiagram: "" };

  const { poses: modelledPoses, patternDescription, patternDiagram } = applyModel(applicable, model);

  // Preserve peak pose unchanged
  const peakPoses = section.poses.filter(p => p.isPeak);
  return { ...section, poses: [...modelledPoses, ...peakPoses], patternDescription, patternDiagram };
}
function detectPeakFamily(peakPose) {
  const data = ASANA_DATA[peakPose];
  if (!data) return "backbend";
  const types = data.type || [];
  if (types.includes("inversion")) return "inversion";
  if (types.includes("arm balance")) return "armBalance";
  if (types.includes("backbend")) return "backbend";
  if (types.includes("forward bend")) return "forwardBend";
  if (types.includes("hip opener")) return "hipOpener";
  if (types.includes("twist")) return "twist";
  if (types.includes("standing")) return "standing";
  return "backbend";
}

// ─── POOL SELECTION HELPERS ──────────────────────────────────────────────────

function makeRng(seed) {
  let s = [...seed].reduce((acc, c) => acc + c.charCodeAt(0), 0);
  return () => {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    return (s >>> 0) / 0xffffffff;
  };
}

// Pick n items from pool.
// Scoring: peak family match = 3pts, intent match = 1pt, random noise = 0–0.4
// Anchors are always included before scoring begins.
// If a peak-family match would displace an anchor, anchors win.
function pickFromPool(pool, n, peakFamily, intent, rng, poolTag = null) {
  const anchors = pool.filter(p => p.anchor);
  const rest    = pool.filter(p => !p.anchor);

  const scored = rest.map(p => ({
    ...p,
    score: ((p.peaks  || []).includes(peakFamily) ? 3 : 0)
         + ((p.intent || []).includes(intent)      ? 1 : 0)
         + rng() * 0.4,
  })).sort((a, b) => b.score - a.score);

  const remaining = Math.max(0, n - anchors.length);
  const selected  = [...anchors, ...scored.slice(0, remaining)];

  const tail = selected.slice(anchors.length);
  for (let i = tail.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [tail[i], tail[j]] = [tail[j], tail[i]];
  }

  return [...anchors, ...tail].map(p => ({
    pose: p.pose, duration: p.dur, note: p.note,
    ...(poolTag ? { _swapPool: poolTag } : {}),
  }));
}

// Look up a pool by its tag string (e.g. "standingExt.L2")
function getPoolByTag(tag) {
  if (!tag) return [];
  const dot = tag.lastIndexOf(".");
  const poolName = tag.slice(0, dot);
  const levelKey = tag.slice(dot + 1);
  return POOLS[poolName]?.[levelKey] || [];
}

function buildSequence(peakPose, length, savasana, level, model, intent = "balanced", suryaConfig = null, emphasisByKey = {}) {
  const timing = computeSectionBudgets(length, savasana, emphasisByKey);
  const data = ASANA_DATA[peakPose];
  if (!data) return null;

  const isL1 = level === "beginner";
  const isL2 = level === "allLevels";
  const isL3 = level === "intermediate" || level === "advanced";
  const isCalming    = intent === "calming";
  const isEnergizing = intent === "energizing";
  const peakFamily   = detectPeakFamily(peakPose);
  const levelKey     = isL1 ? "L1" : isL2 ? "L2" : "L3";

  // Seed = deterministic per unique combination, but random across different combos
  const seed = `${peakPose}|${length}|${level}|${intent}|${Date.now()}`;
  const rng  = makeRng(seed);

  // ── Section 1: Opening ──
  const openingPoses = [
    {
      pose: "Sukhasana / Virasana",
      duration: isL1 ? 3 : 4,
      note: isL1
        ? "Easy seat. Set intention, introduce ujjayi pranayama (2–3 min)."
        : "Virasana preferred for intermediate+. Refine ujjayi. Kapalabhati if L3.",
    },
  ];
  if (isL3) openingPoses.push({ pose: "Kapalabhati Pranayama", duration: 2, note: "1–3 rounds of 45 seconds. Settle back into ujjayi." });

  // ── Section 2: Initial Warming ──
  let warmingPoses;
  const warmingVariants = isL1
    ? [POOLS.warming.L1a, POOLS.warming.L1b, POOLS.warming.L1c, POOLS.warming.L1d, POOLS.warming.L1e]
    : isL2
    ? [POOLS.warming.L2a, POOLS.warming.L2b, POOLS.warming.L2c, POOLS.warming.L2d, POOLS.warming.L2e]
    : [POOLS.warming.L3a, POOLS.warming.L3b, POOLS.warming.L3c, POOLS.warming.L3d, POOLS.warming.L3e];
  const warmingVariant = warmingVariants[Math.floor(rng() * warmingVariants.length)];
  warmingPoses = warmingVariant.map(p => ({ pose: p.pose, duration: p.dur, note: p.note }));
  if (peakFamily === "backbend") {
    warmingPoses.push({ pose: "Supta Baddha Konasana", duration: 2, note: "Mild backbend element — opens hips and thighs." });
  }
  if (peakFamily === "armBalance" && !isL1) {
    warmingPoses.push({ pose: "Phalakasana", duration: 2, note: "Wrist and shoulder activation for arm balance peak." });
  }

  // ── Section 3: Surya Namaskara ──
  let suryaPoses = [];
  let suryaTeacherNote = null;
  const cfg = suryaConfig || { include: true };
  if (!cfg.include) {
    suryaPoses = [];
  } else {
    const vars = cfg.variations || (isL1 ? ["classical", "a"] : isL2 ? ["classical", "a", "b"] : ["a", "b"]);
    const reps = cfg.reps || {};
    if (vars.includes("classical")) {
      const n = reps.classical || (isL1 ? 3 : 2);
      suryaPoses.push({
        pose: "Classical Surya Namaskara", duration: Math.max(2, Math.ceil(n * 1.5)),
        note: `${n} round${n > 1 ? "s" : ""}. Anjaneyasana held 5 breaths each side. ${isL1 ? "Gentle — appropriate for all beginners." : "Good hip flexor preparation."}`,
      });
    }
    if (vars.includes("a")) {
      const n = reps.a || (isL1 ? 2 : isL3 ? 5 : 3);
      suryaPoses.push({
        pose: "Surya Namaskara A", duration: Math.max(2, Math.ceil(n * 1.2)),
        note: `${n} round${n > 1 ? "s" : ""}. ${isL3 ? "Strong pace. Build internal heat." : "Steady breath-led movement."}${peakFamily === "backbend" || peakFamily === "inversion" ? " Hold Urdhva Mukha Svanasana a breath longer." : ""}`,
      });
    }
    if (vars.includes("b")) {
      const n = reps.b || (isL1 ? 1 : isL3 ? 5 : 3);
      suryaPoses.push({
        pose: "Surya Namaskara B", duration: Math.max(3, Math.ceil(n * 1.8)),
        note: `${n} round${n > 1 ? "s" : ""}. Virabhadrasana I held 5–10 breaths on final round. ${isL3 ? "Explore shoulder openers in Vira I." : "Deeper hip flexor exploration."}`,
      });
    }
    // teacherNote is picked up by the section assembly and rendered below the subtitle
    suryaTeacherNote = (peakFamily === "backbend" && (vars.includes("a") || vars.includes("b")))
      ? `Backbend peak tip: hold Anjaneyasana and Virabhadrasana I longer than usual to open hip flexors for ${peakPose}. Try Garudasana or Gomukhasana arms in Virabhadrasana I.`
      : null;
    if (suryaPoses.length === 0) {
      suryaPoses.push({ pose: "Adho Mukha Svanasana", duration: 3, note: "Warm without sun salutations — hold 1–2 minutes." });
    }
  }

  // ── Section 4+5: Standing Poses ──
  const extPool = POOLS.standingExt[levelKey];
  const intPool = POOLS.standingInt[levelKey];

  const extCount = isL1 ? 3 : isL3 ? 4 : 3;
  const intCount = isL1 ? 3 : isL3 ? 4 : 3;

  const standingExtPoses = pickFromPool(extPool, extCount, peakFamily, intent, rng, `standingExt.${levelKey}`);
  let standingIntRaw     = pickFromPool(intPool, intCount, peakFamily, intent, rng, `standingInt.${levelKey}`);

  // Mutual exclusion: Prasarita A and Prasarita A+C shouldn't both appear.
  // If the more specific (C) version was selected, drop the plain A version.
  const hasPrasaritaC = standingIntRaw.some(p => p.pose.includes("and C"));
  if (hasPrasaritaC) {
    standingIntRaw = standingIntRaw.filter(p => p.pose !== "Prasarita Padottanasana A");
  }

  // Prasarita is the symmetrical bridge — must lead the internal rotation section
  const prasaritaIdx = standingIntRaw.findIndex(p => p.pose.includes("Prasarita"));
  const standingIntPoses = prasaritaIdx > 0
    ? [standingIntRaw[prasaritaIdx], ...standingIntRaw.filter((_, i) => i !== prasaritaIdx)]
    : standingIntRaw;

  if (standingIntPoses.length > 0) standingIntPoses[0]._internalStart = true;
  const standingPoses = [...standingExtPoses, ...standingIntPoses];

  // ── Section 6: Abdominals ──
  let abdominalPoses = [];
  if (!isL1 && timing.abdominals > 0) {
    const coreOptions = isL2
      ? [
          [{ pose: "Paripurna Navasana → Ardha Navasana", duration: 3, note: "2–3 times. Yogic bicycles 1–2 min." }],
          [{ pose: "Paripurna Navasana", duration: 2, note: "3 times, 5 breaths each." },
           { pose: "Lolasana", duration: 2, note: "3 × 5 breaths if accessible." }],
        ]
      : [
          [{ pose: "Paripurna Navasana → Ardha Navasana → Tolasana", duration: 4, note: "3–5 times. Tolasana 5–10 breaths." },
           { pose: "Jathara Parivartanasana", duration: 3, note: "5–10 times each side. Kapalabhati option." }],
          [{ pose: "Paripurna Navasana → Ardha Navasana", duration: 3, note: "3–5 times." },
           { pose: "Lolasana", duration: 2, note: "3 × 10 breaths." },
           { pose: "Jathara Parivartanasana", duration: 2, note: "5–10 times each side." }],
        ];
    abdominalPoses = coreOptions[Math.floor(rng() * coreOptions.length)];
  } else if (isL1 && timing.abdominals > 0) {
    abdominalPoses = [{ pose: "Paripurna Navasana", duration: 3, note: "Prep 3 times. Yogic bicycles 1 minute." }];
  }

  // ── Section 7: Arm Balances ──
  let armBalancePoses = [];
  const isArmBalancePeak = peakFamily === "armBalance";
  if (isArmBalancePeak || (timing.armBalances > 0 && !isL1)) {
    const abPool = isL2
      ? [
          [{ pose: "Bakasana", duration: 3, note: "After core + standing. Wrist prep first." },
           { pose: "Bhujapidasana", duration: 2, note: "Prep from Uttanasana and Malasana." },
           { pose: "Wrist Therapy Stretches", duration: 1, note: "Always after arm balance sequences." }],
          [{ pose: "Bakasana", duration: 3, note: "After core + standing. Wrist prep first." },
           { pose: "Malasana → Bakasana", duration: 2, note: "Transition directly from Garland." },
           { pose: "Wrist Therapy Stretches", duration: 1, note: "Always after arm balance sequences." }],
        ]
      : [
          [{ pose: "Sirsasana II Arm Balance Vinyasa", duration: 5, note: "Options: Bakasana, Parsva Bakasana, Eka Pada Koundinyasana, Tittibhasana." },
           { pose: "Astavakrasana / Galavasana", duration: 3, note: "Advanced options." },
           { pose: "Wrist/Shoulder Stretches", duration: 2, note: "Always after." }],
          [{ pose: "Parsva Bakasana", duration: 3, note: "Each side. From Ardha Matsyendrasana." },
           { pose: "Eka Pada Koundinyasana A or B", duration: 3, note: "From Down Dog or Parsva Bakasana." },
           { pose: "Wrist/Shoulder Stretches", duration: 2, note: "Always after." }],
        ];
    armBalancePoses = abPool[Math.floor(rng() * abPool.length)];
    if (isArmBalancePeak) {
      const prepPoses = (data.prep || []).filter(p => ASANA_DATA[p]).slice(0, 3);
      prepPoses.forEach(p => armBalancePoses.unshift({ pose: p, duration: 2, note: `Preparation for ${peakPose}` }));
      armBalancePoses.push({ pose: peakPose, duration: isL1 ? 3 : isL3 ? 5 : 4, note: data.exploration || "Hold, breathe, play the edge.", isPeak: true });
    }
  }

  // ── Section 8: Backbends / Peak Zone ──
  let backbendPoses = [];
  if (peakFamily === "backbend") {
    const prepPoses = (data.prep || []).filter(p => ASANA_DATA[p]).slice(0, isL1 ? 2 : isL3 ? 5 : 3);
    prepPoses.forEach(p => backbendPoses.push({ pose: p, duration: isL1 ? 3 : 2, note: `Pathway to ${peakPose}` }));
    backbendPoses.push({ pose: peakPose, duration: isL1 ? 3 : isL3 ? 6 : 4, note: data.exploration || "Play the edge.", isPeak: true });
    if (isL3) backbendPoses.push({ pose: "Viparita Dandasana", duration: 3, note: "Optional progression. Or Eka Pada Urdhva Dhanurasana." });
    backbendPoses.push({ pose: "Neutral Spine Rest", duration: 2, note: "Savasana position. Let the spine decompress before counterposes." });
  } else {
    const bPool = POOLS.backbendSupport[levelKey];
    const bCount = isL1 ? 2 : isL3 ? 3 : 3;
    backbendPoses = pickFromPool(bPool, bCount, peakFamily, intent, rng, `backbendSupport.${levelKey}`);
    if (peakFamily === "standing") {
      backbendPoses.unshift({ pose: peakPose, duration: isL1 ? 3 : 4, note: data.exploration || "Standing peak.", isPeak: true });
    }
    if (!isL1) backbendPoses.push({ pose: "Neutral Spine Rest", duration: 1, note: "Brief rest before twists." });
  }

  // ── Section 9: Twists ──
  // Jathara Parivartanasana is always first — structural spinal neutraliser after backbends
  let twistPoses = [
    { pose: "Jathara Parivartanasana", duration: isL1 ? 3 : 2,
      note: isL1 ? "Both knees bent, 1 min each side. Initial counterpose after backbends." : "Full version, 1–2 min each side." },
  ];
  const tPool = POOLS.twists[levelKey];
  const tCount = 2;
  const twistSelected = pickFromPool(tPool, tCount, peakFamily, intent, rng, `twists.${levelKey}`);
  twistPoses.push(...twistSelected);
  if (peakFamily === "twist") {
    twistPoses.unshift({ pose: peakPose, duration: 4, note: data.exploration || "Peak twist. Hold fully.", isPeak: true });
  }

  // ── Section 10: Forward Bends + Hip Openers ──
  // Dandasana always opens as the foundational seated pose
  let forwardBendPoses = [
    { pose: "Dandasana", duration: isL1 ? 2 : 1, note: "Foundation for all seated work." },
  ];
  const fbPool = POOLS.forwardBends[levelKey];
  const fbCount = isL1 ? 3 : isL3 ? 4 : 4;
  let fbSelected = pickFromPool(fbPool, fbCount, peakFamily, intent, rng, `forwardBends.${levelKey}`);

  // Counterpose enforcement: after a backbend peak, Paschimottanasana must be first
  // (it is the primary spinal counterpose — not optional or subject to pool ordering)
  if (peakFamily === "backbend") {
    const paschIdx = fbSelected.findIndex(p => p.pose === "Paschimottanasana");
    if (paschIdx > 0) {
      fbSelected = [fbSelected[paschIdx], ...fbSelected.filter((_, i) => i !== paschIdx)];
    } else if (paschIdx === -1) {
      // Force it in at the front regardless
      fbSelected.unshift({ pose: "Paschimottanasana", duration: 3,
        note: "Primary counterpose after backbend peak — lengthens the posterior spine. 1–2 min." });
    }
  }

  // Counterpose enforcement: after an inversion peak, Paschimottanasana is similarly important
  if (peakFamily === "inversion" && !fbSelected.some(p => p.pose === "Paschimottanasana")) {
    fbSelected.unshift({ pose: "Paschimottanasana", duration: 3,
      note: "Spinal counterpose after inversion work. Brings the spine back to neutral. 1–2 min." });
  }

  forwardBendPoses.push(...fbSelected);
  if (peakFamily === "forwardBend" || peakFamily === "hipOpener") {
    forwardBendPoses.push({ pose: peakPose, duration: 4, note: data.exploration || "Hold and breathe deeply.", isPeak: true });
  }

  // ── Section 11: Inversions ──
  let inversionPoses = [];
  const invPool = POOLS.inversions[levelKey];
  if (peakFamily === "inversion") {
    const prepPoses = (data.prep || []).filter(p => ASANA_DATA[p]).slice(0, 2);
    prepPoses.forEach(p => inversionPoses.push({ pose: p, duration: 2, note: `Preparation for ${peakPose}` }));
    inversionPoses.push({ pose: peakPose, duration: 5, note: data.exploration || "Hold fully. Explore variations.", isPeak: true });
    // Balasana counterpose after headstand/forearmstand is structural
    if (["Salamba Sirsasana I", "Pincha Mayurasana", "Adho Mukha Vrksasana"].includes(peakPose)) {
      inversionPoses.push({ pose: "Balasana", duration: 2, note: "Essential counterpose for headstand/forearmstand — hold 1–2 min." });
    }
  } else if (isL1) {
    inversionPoses = pickFromPool(invPool, 2, peakFamily, intent, rng, `inversions.${levelKey}`);
  } else {
    const invCount = isL3 ? 4 : 3;
    inversionPoses = pickFromPool(invPool, invCount, peakFamily, intent, rng, `inversions.${levelKey}`);

    // Structural rule: Sarvangasana must follow Sirsasana — never precede it
    const sirsIdx = inversionPoses.findIndex(p => p.pose.includes("Sirsasana"));
    const sarvIdx = inversionPoses.findIndex(p => p.pose.includes("Sarvangasana"));
    if (sirsIdx > -1 && sarvIdx > -1 && sarvIdx < sirsIdx) {
      const sarv = inversionPoses.splice(sarvIdx, 1)[0];
      inversionPoses.splice(sirsIdx + 1, 0, sarv);
    }

    // Structural rule: Balasana counterpose after any Sirsasana — always, not by chance
    const sirsIdx2 = inversionPoses.findIndex(p => p.pose.includes("Sirsasana"));
    if (sirsIdx2 > -1) {
      const alreadyHasBalasana = inversionPoses[sirsIdx2 + 1]?.pose === "Balasana";
      if (!alreadyHasBalasana) {
        inversionPoses.splice(sirsIdx2 + 1, 0, { pose: "Balasana", duration: 1,
          note: "Essential counterpose for headstand — hold until breath settles." });
      }
    }
  }

  // ── Section 12: Savasana ──
  // Durations must sum to the savasana budget so hard-scaling works correctly.
  const savaPrep = 2; // 1 + 0.5 + 0.5 for the three surrounding poses
  const savaCore = Math.max(2.5, savasana - savaPrep);
  const savasanaPoses = [
    { pose: "Supta Parivartanasana", duration: 1,        note: "Gentle supine twist both sides — final integration." },

  ];

  // ── Assemble sections ──
  const sections = [
    { name: "1. Opening",          subtitle: "Initiate the Yogic Process",                  time: timing.opening,   color: "#d4a574", poses: openingPoses,    icon: "◯", family: "opening" },

    ...(timing.armBalances > 0 || peakFamily === "armBalance" ? [{

      subtitle: "Levity + Flight", time: timing.armBalances || 10, color: "#6b2510",

      icon: "⬢", family: "armBalance",
    }] : []),
    { name: peakFamily === "backbend" ? "8. Backbends ★ Peak" : "8. Backbends", subtitle: peakFamily === "backbend" ? "Peak Pose" : "Heart Opening", time: timing.peak, color: "#8b1a1a", poses: backbendPoses, icon: "●", family: "backbend" },
    { name: "9. Twists",           subtitle: "Pratikriyasana Phase I",                      time: timing.twists,    color: "#5c7a3a", poses: twistPoses,       icon: "↺", family: "twists" },
    { name: peakFamily === "forwardBend" || peakFamily === "hipOpener" ? "10. Forward Bends / Hips ★ Peak" : "10. Forward Bends + Hip Openers", subtitle: "Pratikriyasana Phase II — Deeply Calming", time: timing.forwardBends, color: "#4a6a2a", poses: forwardBendPoses, icon: "◔", family: "forwardBends" },
    { name: peakFamily === "inversion" ? "11. Inversions ★ Peak" : "11. Inversions",       subtitle: "Finishing Practice",                              time: timing.inversions, color: "#2a4a5c", poses: inversionPoses, icon: "▽", family: "inversions" },
    { name: "12. Savasana",        subtitle: "Full Assimilation — Minimum 5 Minutes",      time: timing.savasana,  color: "#1a3a4a", poses: savasanaPoses,   icon: "○", family: "savasana" },
  ].filter(s => s.poses.length > 0);

  // Apply presentation model to build sections
  const modelledSections = sections.map(s => applyModelToSection(s, model));

  // Hard time enforcement — total must not exceed selected length
  const rawTotal = modelledSections.reduce((acc, s) => acc + s.poses.reduce((a, p) => a + (p.duration || 0), 0), 0);
  if (rawTotal > length) {
    const scale = length / rawTotal;
    modelledSections.forEach(section => {
      section.poses.forEach(pose => {
        pose.duration = Math.max(0.5, Math.round((pose.duration * scale) * 2) / 2);
      });
      section.time = section.poses.reduce((a, p) => a + (p.duration || 0), 0);
    });
  }

  return modelledSections;
}

// Poses that are symmetrical — do NOT need "both sides" call-out
const SYMMETRICAL_POSES = new Set([
  "Tadasana", "Savasana", "Dandasana", "Sukhasana / Virasana", "Virasana",
  "Balasana", "Adho Mukha Svanasana", "Urdhva Mukha Svanasana", "Phalakasana",

  "Baddha Konasana → Upavista Konasana", "Baddha Konasana → Upavista Konasana → Kurmasana",
  "Supta Baddha Konasana", "Apanasana", "Bidalasana", "Ananda Balasana",
  "Balasana → Salabhasana B → Balasana", "Salabhasana A", "Salabhasana A then C Prep",
  "Salabhasana A → B → C", "Dhanurasana", "Setu Bandha Sarvangasana",
  "Urdhva Dhanurasana", "Salamba Sirsasana I", "Salamba Sarvangasana",
  "Halasana", "Viparita Karani", "Uttanasana", "Padahastasana",

  "Paripurna Navasana → Ardha Navasana → Tolasana", "Lolasana",
  "Pincha Mayurasana", "Adho Mukha Vrksasana",
]);

// Poses that ARE bilateral but whose names don't obviously signal it
const ALWAYS_BILATERAL = new Set([
  "Vrksasana", "Garudasana", "Natarajasana", "Utkatasana",
  "Pindasana", "Kurmasana",
]);

function isBilateral(poseName, poseNote = "") {
  if (SYMMETRICAL_POSES.has(poseName)) return false;
  if (ALWAYS_BILATERAL.has(poseName)) return true;
  // Check note text
  const noteLC = (poseNote || "").toLowerCase();
  if (noteLC.includes("each side") || noteLC.includes("both sides")) return true;
  // Check ASANA_DATA type
  const data = ASANA_DATA[poseName];
  if (!data) return false;
  const types = data.type || [];
  return types.some(t => ["standing", "twist", "balance", "hip opener", "hip-opener"].includes(t));
}

// Build a flat timing map: for each pose, its start time and end time in the class
function computeTimings(sequence) {
  let elapsed = 0;
  // Returns array of { sectionIndex, poseIndex, start, end }
  const map = [];
  sequence.forEach((section, si) => {
    const sectionStart = elapsed;
    section.poses.forEach((pose, pi) => {
      const dur = pose.duration || 0;
      map.push({ si, pi, start: elapsed, end: elapsed + dur });
      elapsed += dur;
    });
    section._startMin = sectionStart;
    section._endMin = elapsed;
  });
  return { map, total: elapsed };
}

                              </div>
                              {pose.note && (
                                <div style={{ fontSize: 10, color: "#5a4030", marginTop: 1, lineHeight: 1.4 }}>{pose.note}</div>
                              )}
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  ))}

                  {/* Notes area */}
                  <div style={{ marginTop: 20, padding: "12px 14px", background: "#f5e8d0", borderRadius: 6 }}>
                    {/* Anatomy quick-ref */}
                    {PEAK_ANATOMY[peakPose] && (
                      <div style={{ marginBottom: 14, paddingBottom: 14, borderBottom: "1px solid #c4853a" }}>
                        <div style={{ fontSize: 11, fontWeight: "bold", color: "#5c2e12", marginBottom: 6 }}>
                          Peak Pose — Key Actions: {peakPose}
                        </div>
                        {PEAK_ANATOMY[peakPose].keyActions.map((a, i) => (
                          <div key={i} style={{ fontSize: 10, color: "#3d1f0d", marginBottom: 3 }}>
                            {i + 1}. {a}
                          </div>
                        ))}
                        <div style={{ marginTop: 8, display: "flex", gap: 16 }}>
                          <div>
                            <div style={{ fontSize: 9, textTransform: "uppercase", letterSpacing: 1, color: "#4a7a4a", marginBottom: 3 }}>Opening</div>
                            <div style={{ fontSize: 10, color: "#2c4a2c" }}>{PEAK_ANATOMY[peakPose].opens.join(" · ")}</div>
                          </div>
                          <div>
                            <div style={{ fontSize: 9, textTransform: "uppercase", letterSpacing: 1, color: "#7a3a1a", marginBottom: 3 }}>Strengthening</div>
                            <div style={{ fontSize: 10, color: "#4a2010" }}>{PEAK_ANATOMY[peakPose].strengthens.join(" · ")}</div>
                          </div>
                        </div>
                      </div>
                    )}

                    {modifications && (
                      <div style={{ marginBottom: 14, paddingBottom: 14, borderBottom: "1px solid #c4853a" }}>
                        <div style={{ fontSize: 11, fontWeight: "bold", color: "#5c2e12", marginBottom: 5 }}>Modifications to Offer</div>
                        <div style={{ fontSize: 11, color: "#3d1f0d", lineHeight: 1.6, whiteSpace: "pre-wrap" }}>{modifications}</div>
                      </div>
                    )}

                    {/* Full dharma talk */}
                    {DHARMA_PROMPTS[peakPose] ? (() => {
                      const d = DHARMA_PROMPTS[peakPose];
                      return (
                        <div>
                          <div style={{ fontSize: 11, letterSpacing: 1, textTransform: "uppercase", color: "#4a6a2a", fontWeight: "bold", marginBottom: 6 }}>
                            🌿 Dharma Talk — {d.theme}
                          </div>
                          <div style={{ fontSize: 10, color: "#2c3a1c", lineHeight: 1.6, fontStyle: "italic", marginBottom: 8 }}>
                            "{d.opening}"
                          </div>
                          <div style={{ fontSize: 10, fontWeight: "bold", color: "#4a6a2a", marginBottom: 4 }}>Reflection Questions</div>
                          {d.questions.map((q, i) => (
                            <div key={i} style={{ fontSize: 10, color: "#3d1f0d", marginBottom: 4, paddingLeft: 10, borderLeft: "2px solid #a8c890" }}>
                              {i + 1}. {q}
                            </div>
                          ))}
                          <div style={{ fontSize: 10, fontWeight: "bold", color: "#4a6a2a", marginTop: 8, marginBottom: 3 }}>Off the Mat</div>
                          <div style={{ fontSize: 10, color: "#2c3a1c", lineHeight: 1.6, fontStyle: "italic" }}>
                            {d.offTheMat}
                          </div>
                          {dharmaNote && (
                            <div style={{ fontSize: 10, color: "#5c2e12", marginTop: 8, fontStyle: "italic", whiteSpace: "pre-wrap", borderTop: "1px dashed #c4853a", paddingTop: 6 }}>
                              Your notes: {dharmaNote}
                            </div>
                          )}
                        </div>
                      );
                    })() : (
                      <div>
                        <div style={{ fontSize: 11, fontWeight: "bold", marginBottom: 6 }}>Dharma Talk / Theme</div>
                        <div style={{ height: 50, borderBottom: "1px solid #c4853a", marginBottom: 10 }} />
                      </div>
                    )}
                    <div style={{ fontSize: 11, fontWeight: "bold", marginTop: 14, marginBottom: 6 }}>Notes</div>
                    <div style={{ height: 40, borderBottom: "1px solid #c4853a" }} />
                  </div>
                </div>
              </div>
            );})()}

            {/* Save Class Bar */}
            <div style={{
              marginTop: 28, padding: "14px 16px", borderRadius: 8,
              background: "#fefaf4", border: "1px solid #d4b896",
            }}>
              <div style={{ fontSize: 10, letterSpacing: 2, textTransform: "uppercase", color: "#7a5a3a", fontWeight: "bold", marginBottom: 10 }}>
                💾 Save This Class
              </div>
              <div style={{ display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap" }}>
                <input
                  type="text"
                  value={className}
                  onChange={e => setClassName(e.target.value)}
                  placeholder={`${peakPose} — ${length} min (or enter a name)`}
                  style={{
                    flex: 1, minWidth: 200, padding: "8px 12px",
                    fontFamily: "Georgia, serif", fontSize: 13, color: "#3d1f0d",
                    background: "#fff", border: "1px solid #c4853a",
                    borderRadius: 6, outline: "none",
                  }}
                />
                <button onClick={handleSaveClass}
                  disabled={saveStatus === "saving"}
                  style={{
                    padding: "8px 20px", borderRadius: 6, border: "none",
                    background: saveStatus === "saved" ? "#4a7a4a" : saveStatus === "error" ? "#8b1a1a" : "#5c2e12",
                    color: "#fdf6ed", fontSize: 13, cursor: "pointer",
                    fontFamily: "inherit", whiteSpace: "nowrap",
                    transition: "background 0.2s",
                  }}
                >
                  {saveStatus === "saving" ? "Saving…" : saveStatus === "saved" ? "✓ Saved" : saveStatus === "error" ? "Error — try again" : "Save Class"}
                </button>
              </div>
              {savedClasses.length > 0 && (
                <div style={{ fontSize: 11, color: "#8b6040", marginTop: 8 }}>
                  {savedClasses.length} class{savedClasses.length !== 1 ? "es" : ""} saved · reload any time from the start screen
                </div>
              )}
            </div>

            <div style={{ display: "flex", justifyContent: "space-between", marginTop: 16 }}>
              <button onClick={() => setStep(2)} style={backBtnStyle}>← Adjust Settings</button>
              <button
                onClick={() => { setSequence(null); setStep(1); setPeakPose(""); setPoseSearch(""); setClassName(""); }}
                style={{ ...nextBtnStyle, background: "#4a7a6d" }}
              >
                + Plan Another Class
              </button>
            </div>
          </div>
        );})()}

      </div>

      <style>{`
        @media print {
          body * { visibility: hidden; }
          .print-area, .print-area * { visibility: visible; }
        }
        * { box-sizing: border-box; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f5e8d0; }
        ::-webkit-scrollbar-thumb { background: #c4853a; border-radius: 3px; }
      `}</style>
    </div>
  );
}

const backBtnStyle = {
  padding: "10px 24px", background: "#e8d5bc", color: "#3d1f0d",
  border: "1px solid #c4853a", borderRadius: 6, fontSize: 14,
  cursor: "pointer", fontFamily: "inherit",
};
const nextBtnStyle = {
  padding: "10px 28px", background: "#5c2e12", color: "#fdf6ed",
  border: "none", borderRadius: 6, fontSize: 14,
  cursor: "pointer", fontFamily: "inherit",
};


  ReactDOM.render(<YogaClassPlanner />, document.getElementById('root'));
  </script>
</body>
</html>
